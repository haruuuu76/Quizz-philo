<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philo Bac — Révisions</title>
<style>
  :root{
    --bg:#1c1a2e;
    --bg2:#262344;
    --card:#312c54;
    --ink:#f4f0ff;
    --muted:#a89fcf;
    --accent:#ffb14e;
    --accent2:#7ee0c3;
    --bad:#ff6b6b;
    --good:#7ee0c3;
    --radius:18px;
    font-family: "Georgia", "Iowan Old Style", serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(circle at 20% 0%, #3a3463 0%, var(--bg) 55%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 14px 50px;
  }
  .wrap{
    width:100%;
    max-width:480px;
  }
  header{
    text-align:center;
    margin-bottom:14px;
  }
  header .eyebrow{
    font-family: "Courier New", monospace;
    letter-spacing:0.18em;
    font-size:11px;
    color:var(--accent2);
    text-transform:uppercase;
  }
  header h1{
    font-size:28px;
    margin:4px 0 2px;
    font-weight:700;
  }
  header p{
    margin:0;
    color:var(--muted);
    font-size:13px;
  }

  /* Screens */
  .screen{display:none;}
  .screen.active{display:block; animation: fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}

  /* Home menu */
  .menu-grid{
    display:grid;
    gap:10px;
    margin-top:8px;
  }
  .menu-btn{
    background:var(--card);
    border:1px solid #4a4376;
    border-radius:var(--radius);
    color:var(--ink);
    padding:16px 18px;
    text-align:left;
    font-size:16px;
    font-family:inherit;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    transition: transform .12s ease, border-color .12s ease;
  }
  .menu-btn:active{transform:scale(0.98);}
  .menu-btn:hover{border-color:var(--accent);}
  .menu-btn .tag{
    font-family:"Courier New",monospace;
    font-size:11px;
    color:var(--accent);
    background:rgba(255,177,78,0.12);
    border-radius:8px;
    padding:3px 8px;
    white-space:nowrap;
  }
  .menu-btn .sub{
    display:block;
    font-size:12px;
    color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif;
    margin-top:3px;
  }

  .stats-bar{
    display:flex;
    justify-content:space-between;
    background:var(--bg2);
    border-radius:14px;
    padding:10px 14px;
    margin:14px 0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    color:var(--muted);
  }
  .stats-bar b{color:var(--accent2); font-size:14px; display:block;}

  /* Quiz screen */
  .progress-row{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--bg2);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent2), var(--accent));
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }
  .score-pill{
    font-family:"Courier New",monospace;
    font-size:12px;
    background:var(--bg2);
    color:var(--accent2);
    padding:4px 10px;
    border-radius:10px;
    white-space:nowrap;
  }

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:22px 20px;
    border:1px solid #4a4376;
  }
  .theme-label{
    font-family:"Courier New",monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:6px;
  }
  .question{
    font-size:18px;
    line-height:1.45;
    margin:0 0 18px;
  }
  .options{
    display:grid;
    gap:10px;
  }
  .option{
    background:var(--bg2);
    border:1px solid #4a4376;
    color:var(--ink);
    border-radius:12px;
    padding:13px 14px;
    text-align:left;
    font-size:14.5px;
    font-family:"Helvetica Neue",Arial,sans-serif;
    cursor:pointer;
    line-height:1.4;
    transition: background .15s ease, border-color .15s ease, transform .08s ease;
  }
  .option:active{transform:scale(0.99);}
  .option.correct{
    background:rgba(126,224,195,0.18);
    border-color:var(--good);
  }
  .option.wrong{
    background:rgba(255,107,107,0.16);
    border-color:var(--bad);
  }
  .option:disabled{cursor:default;}
  .option .letter{
    display:inline-block;
    width:22px; height:22px;
    border-radius:50%;
    background:#46406f;
    color:var(--ink);
    text-align:center;
    line-height:22px;
    font-size:12px;
    margin-right:8px;
    font-family:"Courier New",monospace;
  }

  .feedback{
    margin-top:16px;
    padding:14px;
    border-radius:12px;
    background:var(--bg2);
    font-size:13.5px;
    line-height:1.5;
    font-family:"Helvetica Neue",Arial,sans-serif;
    display:none;
  }
  .feedback.show{display:block; animation: fadeIn .25s ease;}
  .feedback .verdict{
    font-weight:700;
    font-family:"Georgia",serif;
    font-size:15px;
    margin-bottom:4px;
  }
  .feedback.ok .verdict{color:var(--good);}
  .feedback.ko .verdict{color:var(--bad);}

  .nav-row{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:12px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    font-family:"Helvetica Neue",Arial,sans-serif;
    cursor:pointer;
    transition: transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent); color:#3a2200;}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid #4a4376;}
  .btn:disabled{opacity:.35; cursor:default;}

  /* Flashcard mode */
  .flash-card{
    background:var(--card);
    border:1px solid #4a4376;
    border-radius:var(--radius);
    min-height:230px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    cursor:pointer;
    perspective:1000px;
  }
  .flash-inner{
    transition: opacity .15s ease;
  }
  .flash-theme{
    font-family:"Courier New",monospace;
    font-size:12px;
    color:var(--accent2);
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .flash-front{
    font-size:22px;
    font-weight:700;
  }
  .flash-back{
    font-size:14.5px;
    line-height:1.55;
    color:var(--ink);
    font-family:"Helvetica Neue",Arial,sans-serif;
    display:none;
  }
  .flash-back.show{display:block;}
  .flash-front.hide{display:none;}
  .flash-hint{
    margin-top:14px;
    font-size:11.5px;
    color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif;
  }

  /* Results */
  .result-card{
    text-align:center;
    padding:34px 20px;
  }
  .result-score{
    font-size:54px;
    font-weight:700;
    color:var(--accent2);
    margin:6px 0;
  }
  .result-msg{
    color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:14px;
    margin-bottom:20px;
  }

  .back-link{
    display:block;
    text-align:center;
    margin-top:18px;
    color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13px;
    cursor:pointer;
    text-decoration:underline;
  }

  .theme-pick{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:14px 0 6px;
  }
  .theme-chip{
    font-family:"Courier New",monospace;
    font-size:11.5px;
    padding:7px 11px;
    border-radius:20px;
    border:1px solid #4a4376;
    background:var(--bg2);
    color:var(--muted);
    cursor:pointer;
    user-select:none;
  }
  .theme-chip.active{
    background:var(--accent);
    color:#3a2200;
    border-color:var(--accent);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Bac Philo · Révision</div>
    <h1>Fiches en jeu</h1>
    <p>14 notions · 14 auteurs · 14 citations</p>
  </header>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="stats-bar">
      <div>Meilleur score QCM<br><b id="best-score">—</b></div>
      <div style="text-align:right">Cartes maîtrisées<br><b id="mastered-count">0 / 14</b></div>
    </div>
    <div class="menu-grid">
      <button class="menu-btn" onclick="startQuiz('all')">
        <div>QCM complet<span class="sub">28 questions mélangées</span></div>
        <span class="tag">28 Q</span>
      </button>
      <button class="menu-btn" onclick="startQuiz('quotes')">
        <div>QCM citations<span class="sub">Associer citation ↔ auteur/notion</span></div>
        <span class="tag">14 Q</span>
      </button>
      <button class="menu-btn" onclick="startQuiz('defs')">
        <div>QCM définitions<span class="sub">Reconnaître la définition de chaque notion</span></div>
        <span class="tag">14 Q</span>
      </button>
      <button class="menu-btn" onclick="startFlash()">
        <div>Cartes mémoire<span class="sub">Notion → auteur + idée clé + citation</span></div>
        <span class="tag">FLASH</span>
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="progress-row">
      <span class="score-pill" id="score-pill">0 / 0</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">1/28</span>
    </div>
    <div class="card">
      <div class="theme-label" id="q-theme"></div>
      <p class="question" id="q-text"></p>
      <div class="options" id="q-options"></div>
      <div class="feedback" id="q-feedback">
        <div class="verdict" id="fb-verdict"></div>
        <div id="fb-text"></div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goHome()">Quitter</button>
      <button class="btn btn-primary" id="next-btn" disabled onclick="nextQuestion()">Suivant</button>
    </div>
  </div>

  <!-- FLASHCARDS -->
  <div class="screen" id="screen-flash">
    <div class="progress-row">
      <span class="score-pill" id="flash-pill">1/14</span>
      <div class="progress-track"><div class="progress-fill" id="flash-fill"></div></div>
    </div>
    <div class="flash-card" id="flash-card" onclick="flipCard()">
      <div class="flash-inner">
        <div class="flash-theme" id="flash-theme"></div>
        <div class="flash-front" id="flash-front"></div>
        <div class="flash-back" id="flash-back"></div>
        <div class="flash-hint" id="flash-hint">Touche la carte pour révéler</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goHome()">Quitter</button>
      <button class="btn btn-primary" onclick="nextFlash()">Carte suivante →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div class="card result-card">
      <div class="theme-label">Résultat</div>
      <div class="result-score" id="result-score">0/0</div>
      <div class="result-msg" id="result-msg"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" onclick="goHome()">Accueil</button>
        <button class="btn btn-primary" onclick="restartSame()">Recommencer</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ===================== DATA ===================== */
const NOTIONS = [
  {
    theme:"Conscience", auteur:"Descartes",
    idee:"« Je pense donc je suis. » La conscience est la première certitude : même en doutant de tout, je ne peux pas douter que je pense.",
    citation:"Je pense donc je suis"
  },
  {
    theme:"Inconscient", auteur:"Freud",
    idee:"Nos actions sont souvent guidées par des désirs refoulés et des forces psychiques que nous ne connaissons pas. Structure de l'appareil psychique : ça, moi, surmoi.",
    citation:null
  },
  {
    theme:"Liberté", auteur:"Sartre",
    idee:"Contrairement à un objet, l'homme n'a pas de définition préalable : il est libre de se définir par ses choix et ses actes. « L'homme est condamné à être libre. »",
    citation:"L'homme est condamné à être libre"
  },
  {
    theme:"Devoir", auteur:"Kant",
    idee:"Une action est morale seulement si elle est faite par pur respect du devoir, sans intérêt personnel. « Se donner à soi-même sa propre loi. »",
    citation:"Se donner à soi-même sa propre loi"
  },
  {
    theme:"Bonheur", auteur:"Épicure",
    idee:"Le calcul des plaisirs : savoir refuser un plaisir immédiat s'il apporte une douleur plus grande plus tard.",
    citation:null
  },
  {
    theme:"L'État", auteur:"Hobbes",
    idee:"Le Léviathan : à l'état de nature, c'est « la guerre de tous contre tous ». Pour survivre, les hommes doivent passer un contrat social et confier tout leur pouvoir à un souverain absolu qui garantit paix et sécurité.",
    citation:"La guerre de tous contre tous"
  },
  {
    theme:"Justice", auteur:"Aristote",
    idee:"Être juste, c'est donner à chacun ce qui lui est dû selon ses mérites ou ses besoins. « Le juste est un milieu entre un excès et un défaut. »",
    citation:"Le juste est un milieu entre un excès et un défaut"
  },
  {
    theme:"Art", auteur:"Kant",
    idee:"Le génie et le désintéressement : l'art ne répond pas à des règles de production. Le beau est ce qui plaît « sans concept » et de manière désintéressée.",
    citation:"Plaît sans concept"
  },
  {
    theme:"Technique", auteur:"Descartes",
    idee:"La technique n'est pas qu'un ensemble d'outils, c'est l'application pratique de la science. Elle doit permettre à l'homme de s'affranchir des contraintes naturelles, « comme maître et possesseur de la nature ».",
    citation:"Comme maître et possesseur de la nature"
  },
  {
    theme:"Science", auteur:"Popper",
    idee:"Une théorie n'est pas scientifique parce qu'elle est vraie, mais parce qu'elle accepte d'être testée et peut-être contredite par l'expérience (falsifiabilité). La science progresse par élimination des erreurs, pas par accumulation des certitudes.",
    citation:null
  },
  {
    theme:"Vérité", auteur:"Pascal",
    idee:"La raison ne peut pas tout prouver : il existe des vérités que l'on ressent par le cœur et qui dérivent du raisonnement. « Le cœur a ses raisons que la raison ne connaît point. »",
    citation:"Le cœur a ses raisons que la raison ne connaît point"
  },
  {
    theme:"Religion", auteur:"Marx",
    idee:"La religion est une invention humaine pour supporter la misère sociale : elle détourne l'homme de la lutte pour améliorer sa vie réelle en lui promettant un bonheur illusoire dans l'au-delà.",
    citation:null
  },
  {
    theme:"Raison", auteur:"Kant",
    idee:"La raison humaine est puissante pour organiser ce que nous percevons (la science), mais elle devient folle quand elle veut répondre à des questions qui dépassent l'expérience (Dieu, etc.). « Il faut distinguer ce que je peux savoir de ce que je peux croire. »",
    citation:"Distinguer ce que je peux savoir de ce que je peux croire"
  },
  {
    theme:"Langage", auteur:"Descartes",
    idee:"Le langage n'est pas un simple mécanisme de réactions. Le langage humain est l'expression d'une pensée libre et universelle, capable de s'adapter à n'importe quelle situation : preuve que l'homme possède une âme et une raison.",
    citation:null
  },
  {
    theme:"Nature", auteur:"Descartes",
    idee:"La nature est une immense machine régie par des lois mathématiques et physiques strictes. Les animaux ne sont que des « animaux-machines », sans conscience. L'homme doit en être « maître et possesseur ».",
    citation:"Animaux-machines"
  },
  {
    theme:"Temps", auteur:"Schopenhauer",
    idee:"Le temps est le bourreau de notre existence. Nous courons après des désirs ; une fois satisfaits, nous tombons dans l'ennui. « La vie oscille comme un pendule de droite à gauche, de la souffrance à l'ennui. »",
    citation:"La vie oscille comme un pendule, de la souffrance à l'ennui"
  },
  {
    theme:"Travail", auteur:"Marx",
    idee:"Travailler permet à l'homme d'être fier de ce qu'il crée. Mais dans le système capitaliste, l'ouvrier fait des tâches répétitives et ne possède pas l'objet qu'il fabrique : le travail ne l'humanise plus, il l'aliène. « Ne se sent pas libre, mais aliéné. »",
    citation:"Ne se sent pas libre mais aliéné"
  }
];

const DEFINITIONS = {
  "Art": "Création d'œuvres qui cherche à exprimer le beau ou provoquer une émotion, sans utilité.",
  "Bonheur": "Un état durable de satisfaction totale et sans interruption.",
  "Conscience": "La capacité de l'esprit à se rendre compte de ce qui se passe en soi.",
  "Devoir": "Obligation morale d'agir d'une certaine manière, dictée par la raison ou la loi, qu'on en ait envie ou non.",
  "L'État": "Ensemble des institutions qui dirigent le pays et organisent la vie en société.",
  "Inconscient": "Partie de notre esprit qui nous échappe, regroupant les désirs, souvenirs et pulsions cachées qui influencent nos actes.",
  "Justice": "Respect des droits de chacun, consistant à donner à chacun ce qu'il mérite en appliquant les lois de manière équitable.",
  "Langage": "Tout système de signes qui permet d'exprimer une pensée et de communiquer.",
  "Liberté": "Pouvoir d'agir selon ses propres choix, sans subir de contrainte.",
  "Nature": "Tout ce qui existe sans intervention de l'homme.",
  "Raison": "Faculté de l'esprit qui permet de penser de manière logique, de distinguer le vrai du faux et le bien du mal.",
  "Religion": "Système de croyances et de pratiques qui relie l'homme à une puissance supérieure ou sacrée.",
  "Science": "Connaissance rationnelle et objective du monde, construite grâce à l'observation, l'expérience et la preuve logique.",
  "Technique": "Ensemble des outils, machines et savoir-faire créés par l'homme pour maîtriser son environnement et répondre à ses besoins.",
  "Temps": "Dimension continue dans laquelle s'enchaînent les évènements, divisée entre ce qui n'est plus, ce qui est, et ce qui sera.",
  "Travail": "Effort conscient et organisé de l'homme pour transformer la nature afin de produire ce qui est nécessaire à sa survie ou son confort.",
  "Vérité": "Correspondance parfaite entre ce que l'on dit ou pense et la réalité des faits."
};

/* ===================== QUESTION BUILDERS ===================== */
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pickWrong(correct, pool, n){
  const others = pool.filter(x => x !== correct);
  return shuffle(others).slice(0,n);
}

function buildAuthorQuestions(){
  // "Quel auteur est associé à la notion de X ?"
  return NOTIONS.map(n => {
    const wrong = pickWrong(n.auteur, NOTIONS.map(x=>x.auteur), 3);
    const opts = shuffle([n.auteur, ...wrong]);
    return {
      theme: n.theme,
      text: `Quel philosophe est associé à la notion de « ${n.theme} » ?`,
      options: opts,
      correct: n.auteur,
      explain: n.idee
    };
  });
}

function buildIdeaQuestions(){
  // "Quelle est l'idée de l'auteur pour la notion X ?"
  return NOTIONS.map(n => {
    const wrongIdeas = pickWrong(n.idee, NOTIONS.map(x=>x.idee), 3);
    const opts = shuffle([n.idee, ...wrongIdeas]);
    return {
      theme: n.theme,
      text: `Pour la notion « ${n.theme} » (${n.auteur}), quelle est l'idée principale ?`,
      options: opts,
      correct: n.idee,
      explain: n.idee
    };
  });
}

function buildQuoteQuestions(){
  const withQuotes = NOTIONS.filter(n => n.citation);
  return withQuotes.map(n => {
    const wrong = pickWrong(n.citation, withQuotes.map(x=>x.citation), 3);
    const opts = shuffle([n.citation, ...wrong]);
    return {
      theme: n.theme,
      text: `Quelle citation est liée à « ${n.theme} » (${n.auteur}) ?`,
      options: opts,
      correct: n.citation,
      explain: `${n.idee}`
    };
  });
}

function buildDefQuestions(){
  const themes = Object.keys(DEFINITIONS);
  return themes.map(t => {
    const wrong = pickWrong(DEFINITIONS[t], themes.map(x=>DEFINITIONS[x]), 3);
    const opts = shuffle([DEFINITIONS[t], ...wrong]);
    return {
      theme: t,
      text: `Quelle est la définition de « ${t} » ?`,
      options: opts,
      correct: DEFINITIONS[t],
      explain: DEFINITIONS[t]
    };
  });
}

/* ===================== STATE ===================== */
let quizQuestions = [];
let currentIndex = 0;
let score = 0;
let lastMode = 'all';

let flashOrder = [];
let flashIndex = 0;
let flashRevealed = false;

/* ===================== STORAGE (in-memory, iOS file:// safe) ===================== */
let memBest = null;
let memMastered = [];

function getBest(){
  return memBest;
}
function setBest(text){
  memBest = text;
}
function getMastered(){
  return memMastered;
}
function setMastered(arr){
  memMastered = arr;
}

function refreshHomeStats(){
  const best = getBest();
  document.getElementById('best-score').textContent = best || '—';
  const mastered = getMastered();
  document.getElementById('mastered-count').textContent = `${mastered.length} / ${NOTIONS.length}`;
}

/* ===================== NAVIGATION ===================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){
  refreshHomeStats();
  showScreen('screen-home');
}

/* ===================== QUIZ ===================== */
function startQuiz(mode){
  lastMode = mode;
  let qs = [];
  if(mode === 'all'){
    qs = [...buildAuthorQuestions(), ...buildIdeaQuestions()];
  } else if(mode === 'quotes'){
    qs = buildQuoteQuestions();
  } else if(mode === 'defs'){
    qs = buildDefQuestions();
  }
  quizQuestions = shuffle(qs);
  currentIndex = 0;
  score = 0;
  showScreen('screen-quiz');
  renderQuestion();
}
function restartSame(){
  startQuiz(lastMode);
}

function renderQuestion(){
  const q = quizQuestions[currentIndex];
  document.getElementById('q-theme').textContent = q.theme;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('score-pill').textContent = `${score} / ${quizQuestions.length}`;
  document.getElementById('progress-label').textContent = `${currentIndex+1}/${quizQuestions.length}`;
  document.getElementById('progress-fill').style.width = `${(currentIndex/quizQuestions.length)*100}%`;

  const optsWrap = document.getElementById('q-options');
  optsWrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(opt, btn);
    optsWrap.appendChild(btn);
  });

  document.getElementById('q-feedback').classList.remove('show','ok','ko');
  document.getElementById('next-btn').disabled = true;
}

function selectAnswer(chosen, btnEl){
  const q = quizQuestions[currentIndex];
  const allBtns = document.querySelectorAll('#q-options .option');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = chosen === q.correct;
  if(isCorrect){
    score++;
    btnEl.classList.add('correct');
  } else {
    btnEl.classList.add('wrong');
    allBtns.forEach(b => {
      if(b.textContent.includes(q.correct.slice(0, Math.min(15,q.correct.length)))){
        // best-effort highlight of correct option text
      }
    });
    allBtns.forEach(b => {
      const letterStripped = b.innerText.replace(/^[A-D]\s*/,'').trim();
      if(letterStripped === q.correct) b.classList.add('correct');
    });
  }

  const fb = document.getElementById('q-feedback');
  fb.classList.add('show', isCorrect ? 'ok' : 'ko');
  document.getElementById('fb-verdict').textContent = isCorrect ? '✓ Bonne réponse' : '✗ Pas tout à fait';
  document.getElementById('fb-text').textContent = q.explain;

  document.getElementById('score-pill').textContent = `${score} / ${quizQuestions.length}`;
  document.getElementById('next-btn').disabled = false;
  if(currentIndex === quizQuestions.length - 1){
    document.getElementById('next-btn').textContent = 'Voir le résultat';
  }
}

function nextQuestion(){
  if(currentIndex === quizQuestions.length - 1){
    finishQuiz();
    return;
  }
  currentIndex++;
  document.getElementById('next-btn').textContent = 'Suivant';
  renderQuestion();
}

function finishQuiz(){
  const total = quizQuestions.length;
  document.getElementById('result-score').textContent = `${score}/${total}`;
  const pct = Math.round((score/total)*100);
  let msg;
  if(pct === 100) msg = "Parfait. Tu connais ces fiches sur le bout des doigts.";
  else if(pct >= 80) msg = "Très solide ! Quelques détails à revoir.";
  else if(pct >= 50) msg = "Pas mal, encore un peu d'entraînement et c'est gagné.";
  else msg = "On reprend ces notions une par une, tu vas vite progresser.";
  document.getElementById('result-msg').textContent = `${pct}% — ${msg}`;

  const best = getBest();
  const bestPct = best ? parseInt(best) : -1;
  if(pct > bestPct || !best){
    setBest(`${pct}%`);
  }

  showScreen('screen-results');
}

/* ===================== FLASHCARDS ===================== */
function startFlash(){
  flashOrder = shuffle(NOTIONS.map((_, i) => i));
  flashIndex = 0;
  flashRevealed = false;
  showScreen('screen-flash');
  renderFlash();
}

function renderFlash(){
  const n = NOTIONS[flashOrder[flashIndex]];
  document.getElementById('flash-theme').textContent = n.theme;
  document.getElementById('flash-front').textContent = `${n.theme} → ${n.auteur} ?`;
  document.getElementById('flash-front').classList.remove('hide');
  const back = document.getElementById('flash-back');
  back.innerHTML = `<b>${n.auteur}</b><br><br>${n.idee}`;
  back.classList.remove('show');
  document.getElementById('flash-hint').textContent = 'Touche la carte pour révéler';
  flashRevealed = false;
  document.getElementById('flash-pill').textContent = `${flashIndex+1}/${NOTIONS.length}`;
  document.getElementById('flash-fill').style.width = `${(flashIndex/NOTIONS.length)*100}%`;
}

function flipCard(){
  flashRevealed = !flashRevealed;
  const front = document.getElementById('flash-front');
  const back = document.getElementById('flash-back');
  const hint = document.getElementById('flash-hint');
  if(flashRevealed){
    front.classList.add('hide');
    back.classList.add('show');
    hint.textContent = 'Touche pour revenir';
  } else {
    front.classList.remove('hide');
    back.classList.remove('show');
    hint.textContent = 'Touche la carte pour révéler';
  }
}

function nextFlash(){
  // mark mastered if revealed
  if(flashRevealed){
    const mastered = getMastered();
    const themeName = NOTIONS[flashOrder[flashIndex]].theme;
    if(!mastered.includes(themeName)){
      mastered.push(themeName);
      setMastered(mastered);
    }
  }
  flashIndex++;
  if(flashIndex >= NOTIONS.length){
    refreshHomeStats();
    goHome();
    return;
  }
  renderFlash();
}

/* ===================== INIT ===================== */
refreshHomeStats();
</script>
